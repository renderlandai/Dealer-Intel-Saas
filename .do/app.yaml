name: dealer-intel-api
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
services:
  - name: api
    github:
      repo: renderlandai/Dealer-Intel-Saas
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-s
    health_check:
      http_path: /health
      initial_delay_seconds: 90
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SCHEDULER_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SUPABASE_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SCREENSHOTONE_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SCREENSHOTONE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SERPAPI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: APIFY_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: DEBUG
        scope: RUN_TIME
        value: "false"
      - key: ENABLE_DANGEROUS_ENDPOINTS
        scope: RUN_TIME
        value: "false"
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: "https://dealer-intel-saas.vercel.app"
      - key: WEB_CONCURRENCY
        scope: RUN_TIME
        value: "1"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: "info"
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "PLACEHOLDER"
      - key: STRIPE_PRICE_STARTER
